<!doctype html><meta charset="utf-8">
<body style="margin:0;background:#F4F2FC;font-family:-apple-system,system-ui,sans-serif;padding:32px">
<h2 style="margin:0 0 18px;color:#20233A">Successful / well-crafted icons — pattern study</h2>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:20px;max-width:1200px">
<script>
const apps=[["Things 3","things_3"],["Headspace","headspace"],["Calm","calm"],["Opal","opal_screen_time"],["Rise","rise_sleep_tracker"],["Gentler Streak","gentler_streak"],["Flighty","flighty"],["Fantastical","fantastical"],["Streaks","streaks_habit"],["Oura","oura_ring"],["Whoop","whoop"],["Sleep Cycle","sleep_cycle"],["Halide","halide_camera"],["Carrot","carrot_weather"],["Duolingo","duolingo"]];
document.write(apps.map(([n,f])=>`<div style="background:#fff;border:1px solid #DAD5C9;border-radius:16px;padding:14px;text-align:center">
<img src="success/${f}.png" style="width:130px;height:130px;border-radius:29px;display:block;margin:0 auto 8px"/>
<div style="font-size:12.5px;font-weight:600;color:#20233A">${n}</div></div>`).join(""));
</script></div></body>
