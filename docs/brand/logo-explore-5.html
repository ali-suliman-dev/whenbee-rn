<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Whenbee · immersive bee + ring</title>
<style>
  :root{--bg:#F4F2FC;--surface:#FFFFFF;--hairline:#DAD5C9;--ink:#20233A;--inkSoft:#5C5F73;--inkFaint:#9B9DAB;--primary:#6B5BE6;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;padding:44px 40px 80px}
  h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin:0 0 4px}
  .sub{color:var(--inkSoft);font-size:13.5px;margin:0 0 26px;max-width:820px;line-height:1.5}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;max-width:1020px}
  .card{background:var(--surface);border:1px solid var(--hairline);border-radius:18px;padding:22px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .hero{width:144px;height:144px;border-radius:33px;overflow:hidden;box-shadow:0 8px 22px rgba(70,59,158,0.18)}
  .chips{display:flex;align-items:center;gap:12px}
  .chip{width:36px;height:36px;border-radius:8px;overflow:hidden}
  .chip.sm{width:20px;height:20px;border-radius:5px}
  .clabel{font-size:13.5px;font-weight:600}
  .cnote{font-size:11px;color:var(--inkFaint);text-align:center;line-height:1.45;max-width:210px}
  svg{display:block}
</style></head>
<body>
  <h1>Whenbee · immersive bee + duration ring</h1>
  <p class="sub">Successful-icon craft applied: <b>one centered motif, generous padding, immersive depth</b> (honey glow · gloss · lift). Each tile: <b>color · mono-glass · dark-tint · 20px favicon</b>.</p>
  <div class="row" id="root"></div>
<script>
let U=0;
function defs(mode,id){
  const bg = mode==="color"
      ? `<radialGradient id="bg${id}" cx="0.5" cy="0.42" r="0.85"><stop offset="0" stop-color="#7A69EE"/><stop offset="0.6" stop-color="#5848CF"/><stop offset="1" stop-color="#3C3290"/></radialGradient>`
    : mode==="mono"
      ? `<linearGradient id="bg${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#42455C"/><stop offset="1" stop-color="#232536"/></linearGradient>`
      : `<linearGradient id="bg${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1B1C28"/><stop offset="1" stop-color="#0D0E15"/></linearGradient>`;
  const gold = mode==="mono"
      ? `<linearGradient id="gold${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#D6D6D6"/></linearGradient>`
      : `<linearGradient id="gold${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FCDB7C"/><stop offset="0.5" stop-color="#F4B73F"/><stop offset="1" stop-color="#DD9824"/></linearGradient>`;
  const glow = mode==="color"
      ? `<radialGradient id="glow${id}" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FBCF6C" stop-opacity="0.55"/><stop offset="0.6" stop-color="#FBCF6C" stop-opacity="0.12"/><stop offset="1" stop-color="#FBCF6C" stop-opacity="0"/></radialGradient>`
      : `<radialGradient id="glow${id}" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFFFFF" stop-opacity="0.10"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>`;
  const wing = `<linearGradient id="wing${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF" stop-opacity="0.85"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0.45"/></linearGradient>`;
  return `<defs>${bg}${gold}${glow}${wing}
    <radialGradient id="spec${id}" cx="0.3" cy="0.16" r="0.9"><stop offset="0" stop-color="#FFFFFF" stop-opacity="${mode==='dark'?0.1:0.3}"/><stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
    <filter id="sh${id}" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.6" stdDeviation="2" flood-color="#120C2E" flood-opacity="0.42"/></filter>
  </defs>`;
}
const frame=id=>`<rect x="1" y="1" width="98" height="98" rx="23" fill="url(#bg${id})"/><rect x="1" y="1" width="98" height="98" rx="23" fill="url(#spec${id})"/>`;
const rim=()=>`<rect x="1.7" y="1.7" width="96.6" height="96.6" rx="21.6" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1.2"/>`;
const dim=m=>m==="mono"?"rgba(255,255,255,0.5)":(m==="dark"?"rgba(255,255,255,0.8)":"rgba(255,255,255,0.85)");
const stripeCol=m=>m==="mono"?"#2A2C3C":"#3C328F";

// compact bee body (centred at cx,cy, scale s ; faceless unless eyes) -------------
function beeBody(a,d,m,id,cx,cy,s,eyes){
  const sc=`translate(${cx} ${cy}) scale(${s}) translate(${-50} ${-52})`;
  const stripe=stripeCol(m);
  return `<g transform="${sc}">
    <ellipse cx="35" cy="42" rx="13" ry="7.5" transform="rotate(-26 35 42)" fill="url(#wing${id})"/>
    <ellipse cx="65" cy="42" rx="13" ry="7.5" transform="rotate(26 65 42)" fill="url(#wing${id})"/>
    <path d="M47 33 L44 26 M53 33 L56 26" stroke="${d}" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="44" cy="24.5" r="2.6" fill="${a}"/><circle cx="56" cy="24.5" r="2.6" fill="${a}"/>
    <rect x="38" y="32" width="24" height="46" rx="12" fill="${a}"/>
    <ellipse cx="50" cy="40" rx="8.5" ry="5" fill="#FFFFFF" fill-opacity="0.34"/>
    <g clip-path="url(#bc${id})"><rect x="36" y="49" width="28" height="5.2" fill="${stripe}"/><rect x="36" y="60" width="28" height="5.2" fill="${stripe}"/><rect x="36" y="71" width="28" height="5.2" fill="${stripe}"/></g>
    ${eyes?`<circle cx="45.5" cy="45" r="2.6" fill="${stripe}"/><circle cx="54.5" cy="45" r="2.6" fill="${stripe}"/>`:""}
    <defs><clipPath id="bc${id}"><rect x="38" y="32" width="24" height="46" rx="12"/></clipPath></defs>
  </g>`;
}
// duration ring at cx,cy radius r ----------------------------------------------
function ringMark(a,d,id,cx,cy,r,sw){
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d}" stroke-width="${sw*0.7}"/>
    <path d="M ${cx-r*0.72} ${cy+r*0.69} A ${r} ${r} 0 1 1 ${cx+r*0.72} ${cy+r*0.69}" fill="none" stroke="${a}" stroke-width="${sw}" stroke-linecap="round"/>
    <circle cx="${cx-r*0.72}" cy="${cy+r*0.69}" r="${sw*0.6}" fill="${a}"/>`;
}

const FG={
  beeGlow:(a,d,m,id)=>`<circle cx="50" cy="51" r="36" fill="url(#glow${id})"/>${beeBody(a,d,m,id,50,51,0.92,false)}`,
  beeAlive:(a,d,m,id)=>`<circle cx="50" cy="51" r="36" fill="url(#glow${id})"/>${beeBody(a,d,m,id,50,51,0.92,true)}`,
  beeRing:(a,d,m,id)=>`<circle cx="50" cy="50" r="34" fill="url(#glow${id})"/>${ringMark(a,d,id,50,50,33,6.5)}${beeBody(a,d,m,id,50,51,0.5,false)}`,
  ringOura:(a,d,m,id)=>`<circle cx="50" cy="50" r="33" fill="url(#glow${id})"/>${ringMark(a,d,id,50,50,30,8.5)}`,
  ringSunrise:(a,d,m,id)=>`<circle cx="50" cy="54" r="34" fill="url(#glow${id})"/>
    <path d="M22 60 A28 28 0 0 1 78 60" fill="none" stroke="${a}" stroke-width="7.5" stroke-linecap="round"/>
    <path d="M30 60 A20 20 0 0 1 70 60" fill="none" stroke="${a}" stroke-width="7.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M38 60 A12 12 0 0 1 62 60" fill="none" stroke="${a}" stroke-width="7.5" stroke-linecap="round" opacity="0.6"/>
    <rect x="20" y="63" width="60" height="6" rx="3" fill="${d}"/>`,
  beeSilhouette:(a,d,m,id)=>beeBody(a,d,m,id,50,52,1.18,false),
};

const ITEMS=[
  {k:"beeGlow", label:"Immersive bee · glow", note:"single dimensional bee, honey-lit, glossy, generous padding. Faceless emblem."},
  {k:"beeAlive", label:"Immersive bee · alive", note:"same craft + two calm dot-eyes (Headspace-style warmth, not cartoon)."},
  {k:"beeRing", label:"Bee × duration ring", note:"the companion at the centre of your time. Fuses your two keepers."},
  {k:"ringOura", label:"Duration ring · Oura", note:"premium single gold sweep, lots of indigo space. ‘Your time.’"},
  {k:"ringSunrise", label:"Duration ring · sunrise", note:"concentric gold arcs over a baseline — time rising, Rise-style."},
  {k:"beeSilhouette", label:"Bee · bold fill", note:"Flighty-style: one big confident silhouette, high contrast."},
];

function icon(k,mode){
  const id=++U;
  const acc = mode==="mono" ? "#FFFFFF" : `url(#gold${id})`;
  return `<svg viewBox="0 0 100 100" width="100%" height="100%">${defs(mode,id)}${frame(id)}<g filter="url(#sh${id})">${FG[k](acc,dim(mode),mode,id)}</g>${rim()}</svg>`;
}
const root=document.getElementById("root");
ITEMS.forEach(it=>{
  const card=document.createElement("div");card.className="card";
  card.innerHTML=`<div class="hero">${icon(it.k,"color")}</div>
    <div class="chips"><div class="chip">${icon(it.k,"color")}</div><div class="chip">${icon(it.k,"mono")}</div><div class="chip">${icon(it.k,"dark")}</div><div class="chip sm">${icon(it.k,"color")}</div></div>
    <div class="clabel">${it.label}</div><div class="cnote">${it.note}</div>`;
  root.appendChild(card);
});
</script></body></html>
